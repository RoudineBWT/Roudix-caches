name: Update and build packages

on:
  schedule:
    - cron: "0 8 * * *" # tous les jours à 8h
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: roudix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # ── 1. Versions courantes extraites des fichiers nix ──────────────────
      - name: Read current versions
        id: current
        run: |
          NIX="pkgs/heroic/default.nix"
          LEG="pkgs/heroic/legendary.nix"

          HEROIC_CUR=$(grep -oP 'version\s*=\s*"\K[^"]+' "$NIX" | head -1)
          LEG_CUR=$(grep    -oP 'version\s*=\s*"\K[^"]+' "$LEG" | head -1)
          ELEC_MAJOR_CUR=$(grep -oP 'electron_\K\d+' "$NIX" | head -1)

          echo "heroic=$HEROIC_CUR"       >> "$GITHUB_OUTPUT"
          echo "legendary=$LEG_CUR"       >> "$GITHUB_OUTPUT"
          echo "electron=$ELEC_MAJOR_CUR" >> "$GITHUB_OUTPUT"

          echo "=== Versions actuelles ==="
          echo "heroic:    $HEROIC_CUR"
          echo "legendary: $LEG_CUR"
          echo "electron:  $ELEC_MAJOR_CUR"

      # ── 2. Versions upstream ──────────────────────────────────────────────
      - name: Fetch upstream versions
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEROIC_TAG=$(gh release view \
            --repo Heroic-Games-Launcher/HeroicGamesLauncher \
            --json tagName -q .tagName)
          HEROIC_NEW="${HEROIC_TAG#v}"

          LEG_TAG=$(gh release view \
            --repo Heroic-Games-Launcher/legendary \
            --json tagName -q .tagName)
          LEG_NEW="${LEG_TAG#v}"

          # Electron major depuis le package.json du tag
          PKG=$(curl -fsSL \
            "https://raw.githubusercontent.com/Heroic-Games-Launcher/HeroicGamesLauncher/${HEROIC_TAG}/package.json")
          ELEC_RAW=$(echo "$PKG" | jq -r '.devDependencies.electron')
          ELEC_MAJOR=$(echo "$ELEC_RAW" | grep -oP '\d+' | head -1)

          echo "heroic=$HEROIC_NEW"      >> "$GITHUB_OUTPUT"
          echo "heroic_tag=$HEROIC_TAG"  >> "$GITHUB_OUTPUT"
          echo "legendary=$LEG_NEW"      >> "$GITHUB_OUTPUT"
          echo "electron=$ELEC_MAJOR"    >> "$GITHUB_OUTPUT"

          echo "=== Versions upstream ==="
          echo "heroic:    $HEROIC_NEW"
          echo "legendary: $LEG_NEW"
          echo "electron:  $ELEC_MAJOR"

      # ── 3. Détecter ce qui a changé ───────────────────────────────────────
      - name: Detect changes
        id: changes
        run: |
          HEROIC_CHANGED=false
          LEG_CHANGED=false
          ELEC_CHANGED=false
          ANY=false

          [ "${{ steps.upstream.outputs.heroic }}"    != "${{ steps.current.outputs.heroic }}"   ] \
            && HEROIC_CHANGED=true && ANY=true
          [ "${{ steps.upstream.outputs.legendary }}" != "${{ steps.current.outputs.legendary }}" ] \
            && LEG_CHANGED=true   && ANY=true
          [ "${{ steps.upstream.outputs.electron }}"  != "${{ steps.current.outputs.electron }}"  ] \
            && ELEC_CHANGED=true  && ANY=true

          echo "heroic=$HEROIC_CHANGED"   >> "$GITHUB_OUTPUT"
          echo "legendary=$LEG_CHANGED"   >> "$GITHUB_OUTPUT"
          echo "electron=$ELEC_CHANGED"   >> "$GITHUB_OUTPUT"
          echo "any=$ANY"                 >> "$GITHUB_OUTPUT"

          echo "=== Changements détectés ==="
          echo "heroic:    $HEROIC_CHANGED"
          echo "legendary: $LEG_CHANGED"
          echo "electron:  $ELEC_CHANGED"

      # ── 4a. Hash source Heroic ────────────────────────────────────────────
      - name: Compute heroic src hash
        if: steps.changes.outputs.heroic == 'true'
        id: hash_heroic_src
        run: |
          TAG="${{ steps.upstream.outputs.heroic_tag }}"
          HASH=$(nix-prefetch-url --unpack \
            "https://github.com/Heroic-Games-Launcher/HeroicGamesLauncher/archive/refs/tags/${TAG}.tar.gz" \
            2>/dev/null | tail -1 | xargs nix hash convert --hash-algo sha256 --to sri)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "heroic src hash: $HASH"

      # ── 4b. Hash pnpmDeps ─────────────────────────────────────────────────
      # Recalculé si heroic ou electron changent (le lockfile ou les deps changent)
      - name: Compute pnpm deps hash
        if: >-
          steps.changes.outputs.heroic == 'true' ||
          steps.changes.outputs.electron == 'true'
        id: hash_pnpm
        run: |
          TAG="${{ steps.upstream.outputs.heroic_tag }}"

          TMPDIR_LOCK=$(mktemp -d)
          curl -fsSLo "$TMPDIR_LOCK/pnpm-lock.yaml" \
            "https://raw.githubusercontent.com/Heroic-Games-Launcher/HeroicGamesLauncher/${TAG}/pnpm-lock.yaml"

          # prefetch-pnpm-deps prend le chemin du lockfile en argument
          FULL_OUTPUT=$(nix run nixpkgs#prefetch-pnpm-deps -- "$TMPDIR_LOCK/pnpm-lock.yaml" 2>&1)
          HASH=$(echo "$FULL_OUTPUT" | grep '^sha256-' | tail -1)

          if [[ "$HASH" != sha256-* ]]; then
            echo "ERREUR: hash pnpm invalide. Sortie complète:"
            echo "$FULL_OUTPUT"
            exit 1
          fi

          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "pnpm deps hash: $HASH"

      # ── 4c. Hash legendary ────────────────────────────────────────────────
      - name: Compute legendary hash
        if: steps.changes.outputs.legendary == 'true'
        id: hash_legendary
        run: |
          VER="${{ steps.upstream.outputs.legendary }}"
          HASH=$(nix-prefetch-url --unpack \
            "https://github.com/Heroic-Games-Launcher/legendary/archive/refs/tags/${VER}.tar.gz" \
            2>/dev/null | tail -1 | xargs nix hash convert --hash-algo sha256 --to sri)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "legendary hash: $HASH"

      # ── 5a. Patcher default.nix ───────────────────────────────────────────
      - name: Patch default.nix
        if: steps.changes.outputs.any == 'true'
        env:
          HEROIC_NEW:     ${{ steps.upstream.outputs.heroic }}
          ELEC_MAJOR:     ${{ steps.upstream.outputs.electron }}
          SRC_HASH:       ${{ steps.hash_heroic_src.outputs.hash }}
          PNPM_HASH:      ${{ steps.hash_pnpm.outputs.hash }}
          ELEC_CHANGED:   ${{ steps.changes.outputs.electron }}
          HEROIC_CHANGED: ${{ steps.changes.outputs.heroic }}
        run: |
          NIX="pkgs/heroic/default.nix"

          # ── version heroic + hash src (1ère occurrence de hash) ──────────
          if [ "$HEROIC_CHANGED" = "true" ]; then
            sed -i "s|version = \"[^\"]*\"|version = \"${HEROIC_NEW}\"|" "$NIX"
            sed -i "0,/hash = \"sha256-[^\"]*\"/ s|hash = \"sha256-[^\"]*\"|hash = \"${SRC_HASH}\"|" "$NIX"
          fi

          # ── pnpmDeps hash (2ème occurrence de hash) ───────────────────────
          if [ -n "$PNPM_HASH" ]; then
            awk -v new="$PNPM_HASH" '
              /hash = "sha256-/ { count++
                if (count == 2) {
                  sub(/hash = "sha256-[^"]*"/, "hash = \"" new "\"")
                }
              }
              { print }
            ' "$NIX" > /tmp/default.nix.tmp && mv /tmp/default.nix.tmp "$NIX"
          fi

          # ── electron_NN ──────────────────────────────────────────────────
          if [ "$ELEC_CHANGED" = "true" ] && [ -n "$ELEC_MAJOR" ]; then
            CUR_ELEC=$(grep -oP 'electron_\K\d+' "$NIX" | head -1)
            sed -i "s|electron_${CUR_ELEC}|electron_${ELEC_MAJOR}|g" "$NIX"
          fi

          echo "=== default.nix après patch ==="
          git diff "$NIX"

      # ── 5b. Patcher legendary.nix ─────────────────────────────────────────
      - name: Patch legendary.nix
        if: steps.changes.outputs.legendary == 'true'
        env:
          LEG_NEW:  ${{ steps.upstream.outputs.legendary }}
          LEG_HASH: ${{ steps.hash_legendary.outputs.hash }}
        run: |
          LEG="pkgs/heroic/legendary.nix"
          sed -i "s|version = \"[^\"]*\"|version = \"${LEG_NEW}\"|"   "$LEG"
          sed -i "s|hash = \"sha256-[^\"]*\"|hash = \"${LEG_HASH}\"|" "$LEG"

          echo "=== legendary.nix après patch ==="
          git diff "$LEG"

      # ── 6. Build + push cachix ────────────────────────────────────────────
      - name: Build heroic-custom
        if: steps.changes.outputs.any == 'true'
        run: |
          nix build .#heroic-custom --print-build-logs

      # ── 7. Pull Request ───────────────────────────────────────────────────
      - name: Build PR description
        if: steps.changes.outputs.any == 'true'
        id: pr_body
        run: |
          BODY="## Mise à jour automatique"$'\n\n'
          BODY+="| Package | Avant | Après |"$'\n'
          BODY+="|---|---|---|"$'\n'

          [ "${{ steps.changes.outputs.heroic }}"    = "true" ] && \
            BODY+="| **heroic** | \`${{ steps.current.outputs.heroic }}\` | \`${{ steps.upstream.outputs.heroic }}\` |"$'\n'
          [ "${{ steps.changes.outputs.legendary }}" = "true" ] && \
            BODY+="| **legendary** | \`${{ steps.current.outputs.legendary }}\` | \`${{ steps.upstream.outputs.legendary }}\` |"$'\n'
          [ "${{ steps.changes.outputs.electron }}"  = "true" ] && \
            BODY+="| **electron** | \`${{ steps.current.outputs.electron }}\` | \`${{ steps.upstream.outputs.electron }}\` |"$'\n'

          BODY+=$'\n'"Release: https://github.com/Heroic-Games-Launcher/HeroicGamesLauncher/releases/tag/${{ steps.upstream.outputs.heroic_tag }}"

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY"      >> "$GITHUB_OUTPUT"
          echo "$EOF"       >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.changes.outputs.any == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "update/heroic-${{ steps.upstream.outputs.heroic }}"
          delete-branch: true
          commit-message: |
            heroic: ${{ steps.current.outputs.heroic }} → ${{ steps.upstream.outputs.heroic }}

            legendary: ${{ steps.current.outputs.legendary }} → ${{ steps.upstream.outputs.legendary }}
            electron:  ${{ steps.current.outputs.electron }} → ${{ steps.upstream.outputs.electron }}
          title: "heroic: ${{ steps.current.outputs.heroic }} → ${{ steps.upstream.outputs.heroic }}"
          body: ${{ steps.pr_body.outputs.body }}
          labels: "automated,update"
