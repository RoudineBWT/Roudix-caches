name: Update and build packages

on:
  schedule:
    - cron: "0 8 * * *" # tous les jours à 8h
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: roudix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # ── 1. Versions courantes extraites des fichiers nix ──────────────────
      - name: Read current versions
        id: current
        run: |
          NIX="pkgs/heroic/default.nix"
          LEG="pkgs/heroic/legendary.nix"

          HEROIC_CUR=$(grep -oP 'version\s*=\s*"\K[^"]+' "$NIX" | head -1)
          LEG_CUR=$(grep    -oP 'version\s*=\s*"\K[^"]+' "$LEG" | head -1)

          echo "heroic=$HEROIC_CUR"  >> "$GITHUB_OUTPUT"
          echo "legendary=$LEG_CUR" >> "$GITHUB_OUTPUT"

          echo "=== Versions actuelles ==="
          echo "heroic:    $HEROIC_CUR"
          echo "legendary: $LEG_CUR"

      # ── 2. Versions upstream ──────────────────────────────────────────────
      - name: Fetch upstream versions
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEROIC_TAG=$(gh release view \
            --repo Heroic-Games-Launcher/HeroicGamesLauncher \
            --json tagName -q .tagName)
          HEROIC_NEW="${HEROIC_TAG#v}"

          LEG_TAG=$(gh release view \
            --repo Heroic-Games-Launcher/legendary \
            --json tagName -q .tagName)
          LEG_NEW="${LEG_TAG#v}"

          echo "heroic=$HEROIC_NEW"      >> "$GITHUB_OUTPUT"
          echo "heroic_tag=$HEROIC_TAG"  >> "$GITHUB_OUTPUT"
          echo "legendary=$LEG_NEW"      >> "$GITHUB_OUTPUT"

          echo "=== Versions upstream ==="
          echo "heroic:    $HEROIC_NEW"
          echo "legendary: $LEG_NEW"

      # ── 3. Détecter ce qui a changé ───────────────────────────────────────
      - name: Detect changes
        id: changes
        run: |
          HEROIC_CHANGED=false
          LEG_CHANGED=false
          ANY=false

          [ "${{ steps.upstream.outputs.heroic }}"    != "${{ steps.current.outputs.heroic }}"   ] \
            && HEROIC_CHANGED=true && ANY=true
          [ "${{ steps.upstream.outputs.legendary }}" != "${{ steps.current.outputs.legendary }}" ] \
            && LEG_CHANGED=true   && ANY=true

          echo "heroic=$HEROIC_CHANGED"   >> "$GITHUB_OUTPUT"
          echo "legendary=$LEG_CHANGED"   >> "$GITHUB_OUTPUT"
          echo "any=$ANY"                 >> "$GITHUB_OUTPUT"

          echo "=== Changements détectés ==="
          echo "heroic:    $HEROIC_CHANGED"
          echo "legendary: $LEG_CHANGED"

      # ── 4a. Hash source Heroic ────────────────────────────────────────────
      - name: Compute heroic src hash
        if: steps.changes.outputs.heroic == 'true'
        id: hash_heroic_src
        run: |
          TAG="${{ steps.upstream.outputs.heroic_tag }}"
          HASH=$(nix-prefetch-url --unpack \
            "https://github.com/Heroic-Games-Launcher/HeroicGamesLauncher/archive/refs/tags/${TAG}.tar.gz" \
            2>/dev/null | tail -1 | xargs nix hash convert --hash-algo sha256 --to sri)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "heroic src hash: $HASH"

      # ── 4b. Hash pnpmDeps ─────────────────────────────────────────────────
      - name: Compute pnpm deps hash
        if: steps.changes.outputs.heroic == 'true'
        id: hash_pnpm
        env:
          HEROIC_NEW: ${{ steps.upstream.outputs.heroic }}
          SRC_HASH: ${{ steps.hash_heroic_src.outputs.hash }}
        run: |
          python3 - <<'EOF'
          import re, os

          content = open("pkgs/heroic/default.nix").read()

          heroic_new = os.environ["HEROIC_NEW"]
          src_hash   = os.environ["SRC_HASH"]

          # version
          content = re.sub(r'(version\s*=\s*")[^"]*(")', rf'\g<1>{heroic_new}\2', content, count=1)
          # 1ère occurrence de hash = src
          content = re.sub(r'(hash\s*=\s*")[^"]*(")', rf'\g<1>{src_hash}\2', content, count=1)
          # 2ème occurrence de hash = pnpmDeps → vide pour déclencher l'erreur nix
          count = [0]
          def empty_second(m):
              count[0] += 1
              return m.group(1) + m.group(2) if count[0] == 2 else m.group(0)
          content = re.sub(r'(hash\s*=\s*")[^"]*(")', empty_second, content)

          open("pkgs/heroic/default.nix", "w").write(content)
          EOF

          echo "=== default.nix patché pour probe ==="
          git diff pkgs/heroic/default.nix

          NIX_OUTPUT=$(nix build .#heroic-custom 2>&1) || true
          echo "$NIX_OUTPUT"

          HASH=$(echo "$NIX_OUTPUT" | grep 'got:' | awk '{print $2}' | head -1)

          git checkout pkgs/heroic/default.nix

          if [[ "$HASH" != sha256-* ]]; then
            echo "ERREUR: hash pnpm invalide. Sortie nix build:"
            echo "$NIX_OUTPUT"
            exit 1
          fi

          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "pnpm deps hash: $HASH"

      # ── 4c. Hash legendary ────────────────────────────────────────────────
      - name: Compute legendary hash
        if: steps.changes.outputs.legendary == 'true'
        id: hash_legendary
        run: |
          VER="${{ steps.upstream.outputs.legendary }}"
          HASH=$(nix-prefetch-url --unpack \
            "https://github.com/Heroic-Games-Launcher/legendary/archive/refs/tags/${VER}.tar.gz" \
            2>/dev/null | tail -1 | xargs nix hash convert --hash-algo sha256 --to sri)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "legendary hash: $HASH"

      # ── 5a. Patcher default.nix ───────────────────────────────────────────
      - name: Patch default.nix
        if: steps.changes.outputs.heroic == 'true'
        env:
          HEROIC_NEW: ${{ steps.upstream.outputs.heroic }}
          SRC_HASH: ${{ steps.hash_heroic_src.outputs.hash }}
          PNPM_HASH: ${{ steps.hash_pnpm.outputs.hash }}
        run: |
          python3 - <<'EOF'
          import re, os

          content = open("pkgs/heroic/default.nix").read()

          heroic_new = os.environ["HEROIC_NEW"]
          src_hash   = os.environ["SRC_HASH"]
          pnpm_hash  = os.environ["PNPM_HASH"]

          # version
          content = re.sub(r'(version\s*=\s*")[^"]*(")', rf'\g<1>{heroic_new}\2', content, count=1)
          # 1ère occurrence de hash = src
          content = re.sub(r'(hash\s*=\s*")[^"]*(")', rf'\g<1>{src_hash}\2', content, count=1)
          # 2ème occurrence de hash = pnpmDeps
          count = [0]
          def replace_pnpm(m):
              count[0] += 1
              return m.group(1) + pnpm_hash + m.group(2) if count[0] == 2 else m.group(0)
          content = re.sub(r'(hash\s*=\s*")[^"]*(")', replace_pnpm, content)

          open("pkgs/heroic/default.nix", "w").write(content)
          EOF

          echo "=== default.nix après patch ==="
          git diff pkgs/heroic/default.nix

      # ── 5b. Patcher legendary.nix ─────────────────────────────────────────
      - name: Patch legendary.nix
        if: steps.changes.outputs.legendary == 'true'
        env:
          LEG_NEW: ${{ steps.upstream.outputs.legendary }}
          LEG_HASH: ${{ steps.hash_legendary.outputs.hash }}
        run: |
          LEG="pkgs/heroic/legendary.nix"
          sed -i "s|version = \"[^\"]*\"|version = \"${LEG_NEW}\"|"   "$LEG"
          sed -i "s|hash = \"sha256-[^\"]*\"|hash = \"${LEG_HASH}\"|" "$LEG"

          echo "=== legendary.nix après patch ==="
          git diff "$LEG"

      # ── 6. Build + push cachix ────────────────────────────────────────────
      - name: Build heroic-custom
        if: steps.changes.outputs.any == 'true'
        run: |
          nix build .#heroic-custom --print-build-logs

      # ── 7. Commit + push direct sur main ──────────────────────────────────
      - name: Commit and push
        if: steps.changes.outputs.any == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pkgs/heroic/default.nix pkgs/heroic/legendary.nix

          MSG="heroic: ${{ steps.current.outputs.heroic }} → ${{ steps.upstream.outputs.heroic }}"
          [ "${{ steps.changes.outputs.legendary }}" = "true" ] && \
            MSG+=$'\n\n'"legendary: ${{ steps.current.outputs.legendary }} → ${{ steps.upstream.outputs.legendary }}"

          git commit -m "$MSG"
          git push origin HEAD:main
