name: Update and build packages

on:
  schedule:
    - cron: "0 8 * * *" # tous les jours à 8h
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: roudix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Update heroic version and hashes
        run: |
          # Récupère la dernière version depuis l'API GitHub
          LATEST=$(curl -fsSL \
            "https://api.github.com/repos/Heroic-Games-Launcher/HeroicGamesLauncher/releases/latest" \
            | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          echo "Dernière version: $LATEST"

          # nix-update met à jour version + src.hash + pnpmDeps.hash
          # Le chemin pointe vers ton fichier dans pkgs/heroic/default.nix
          echo "LATEST=$LATEST" >> $GITHUB_ENV

          nix run nixpkgs#nix-update -- \
            --version "$LATEST" \
            --flake \
            --attr packages.x86_64-linux.heroic-custom \
            heroic-custom

      - name: Build and push to cache
        run: nix build .#heroic-custom --print-build-logs

      - name: Commit changements si nouvelle version
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "heroic: update to ${{ env.LATEST }}"
          title: "heroic: auto-update vers ${{ env.LATEST }}"
          branch: update/heroic
          delete-branch: true
