name: Update & build scxctl

on:
  schedule:
    - cron: "0 4 * * *"   # tous les jours à 4h UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v26
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@v14
        with:
          name: roudix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # ── 1. Dernière version de scx-loader (pas scx !) ─────────────────
      - name: Get latest scx-loader release
        id: upstream
        run: |
          VERSION=$(curl -s https://api.github.com/repos/sched-ext/scx-loader/releases/latest \
            | jq -r '.tag_name' | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Latest scx-loader version: $VERSION"

      # ── 2. Version actuelle dans le repo ──────────────────────────────
      - name: Get current version in repo
        id: current
        run: |
          VERSION=$(grep 'version\s*=' pkgs/scxctl.nix | head -1 \
            | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version in repo: $VERSION"

      # ── 3. Skip si déjà à jour ────────────────────────────────────────
      - name: Check if update needed
        id: check
        run: |
          if [ "${{ steps.upstream.outputs.version }}" = "${{ steps.current.outputs.version }}" ]; then
            echo "needed=false" >> $GITHUB_OUTPUT
            echo "Already up to date, skipping."
          else
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "Update: ${{ steps.current.outputs.version }} → ${{ steps.upstream.outputs.version }}"
          fi

      # ── 4. Calculer le src hash ───────────────────────────────────────
      - name: Calculate src hash
        if: steps.check.outputs.needed == 'true'
        id: src_hash
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          HASH=$(nix-prefetch-url --unpack \
            "https://github.com/sched-ext/scx-loader/archive/v${VERSION}.tar.gz" 2>/dev/null \
            | tail -1)
          SRI=$(nix hash convert --hash-algo sha256 --to sri "$HASH" 2>/dev/null || \
                nix hash to-sri --type sha256 "$HASH" 2>/dev/null)
          echo "hash=$SRI" >> $GITHUB_OUTPUT
          echo "src hash: $SRI"

      # ── 5. Mettre à jour version + src hash ───────────────────────────
      - name: Update version and src hash
        if: steps.check.outputs.needed == 'true'
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          SRC_HASH="${{ steps.src_hash.outputs.hash }}"
          sed -i "s/version\s*=\s*\"[^\"]*\"/version   = \"${VERSION}\"/" pkgs/scxctl.nix
          sed -i "0,/hash\s*=\s*\"[^\"]*\"/s||hash   = \"${SRC_HASH}\"|" pkgs/scxctl.nix

      # ── 6. Obtenir le cargo hash via build raté ───────────────────────
      - name: Get cargo hash
        if: steps.check.outputs.needed == 'true'
        id: cargo_hash
        run: |
          sed -i "s/cargoHash\s*=\s*\"[^\"]*\"/cargoHash = \"sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=\"/" pkgs/scxctl.nix
          BUILD_OUT=$(nix build .#scxctl 2>&1 || true)
          CARGO_HASH=$(echo "$BUILD_OUT" | grep -oP 'got:\s*\K(sha256-[A-Za-z0-9+/=]+)' | head -1)
          if [ -z "$CARGO_HASH" ]; then
            echo "Could not extract cargoHash:"
            echo "$BUILD_OUT"
            exit 1
          fi
          echo "hash=$CARGO_HASH" >> $GITHUB_OUTPUT
          echo "cargo hash: $CARGO_HASH"

      - name: Update cargoHash
        if: steps.check.outputs.needed == 'true'
        run: |
          sed -i "s/cargoHash\s*=\s*\"[^\"]*\"/cargoHash = \"${{ steps.cargo_hash.outputs.hash }}\"/" pkgs/scxctl.nix

      # ── 7. Build final + push Cachix ──────────────────────────────────
      - name: Build and push to Cachix
        if: steps.check.outputs.needed == 'true'
        run: |
          nix build .#scxctl --print-out-paths | cachix push roudix

      # ── 8. Commit ─────────────────────────────────────────────────────
      - name: Commit updated scxctl.nix
        if: steps.check.outputs.needed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pkgs/scxctl.nix
          git commit -m "chore: bump scxctl ${{ steps.current.outputs.version }} → ${{ steps.upstream.outputs.version }}"
          git push
